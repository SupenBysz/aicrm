server {
  listen 80;
  server_name console.kyai-crm.example;

  root /data/kyai_crm/www/ky-admin-host;
  index index.html;
  client_max_body_size 8m;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok
";
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/v1/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-KY-Workspace-Id $http_x_ky_workspace_id;
    proxy_set_header X-KY-Workspace-Type $http_x_ky_workspace_type;
    proxy_set_header X-KY-Request-Id $http_x_ky_request_id;
    proxy_pass http://127.0.0.1:18081;
